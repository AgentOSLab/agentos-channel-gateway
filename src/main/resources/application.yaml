server:
  port: 8012

spring:
  profiles:
    active: local
  application:
    name: agentos-channel-gateway

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}

  jackson:
    default-property-inclusion: non_null
    deserialization:
      fail-on-unknown-properties: false

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: always
  metrics:
    tags:
      application: ${spring.application.name}

logging:
  level:
    root: ${LOG_LEVEL:INFO}
    com.agentos.channelgateway: DEBUG

agentos:
  service-auth:
    identity: channel-gateway
    shared-secret: ${SERVICE_AUTH_SECRET:changeme-dev-secret-32-chars-min!!}

  services:
    conversation-url: ${CONVERSATION_URL:http://localhost:8011}
    user-system-url: ${USER_SYSTEM_URL:http://localhost:8006}

  channel-gateway:
    webhooks:
      # When true: Slack requires SLACK_SIGNING_SECRET; WhatsApp/Teams return 501 until signature/JWT checks exist.
      require-verification: ${CHANNEL_WEBHOOK_REQUIRE_VERIFICATION:false}
    slack:
      signing-secret: ${SLACK_SIGNING_SECRET:}
